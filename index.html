<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOPWATCH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stopwatch">
        <div class="timerdisplay">00:00:00</div>
    </div>
    <div class="buttons">
        <button class="btn" style="--clr:red;" id="stop">Stop</button>
        <button class="btn" style="--clr:blue;" id="start">Start</button>
        <button class="btn" style="--clr:green;" id="reset">Reset</button>

    </div>
    <script src="app.js"></script>
</body>
</html>
